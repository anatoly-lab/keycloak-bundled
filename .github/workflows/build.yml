---
# Build & push the custom Keycloak image (Keycloak + Herdo remember-me SPI).
#
# See CLAUDE.md and the project brief for the why. This workflow produces a
# reproducible OCI image, pushes it to GHCR under multiple tags, then runs a
# pair of downstream verification jobs (boot smoke test + Testcontainers
# integration tests). On `v*` tag pushes, a final `release` job promotes the
# already-verified immutable SHA tag to the human-readable semver tag and
# publishes a GitHub Release -- only after smoke + integration tests pass.
#
# Triggers:
#   - push to main      -> rebuild on every merge
#   - tag push v*       -> release builds (concurrency does NOT cancel these)
#   - workflow_dispatch -> manual rebuild, optional KC/plugin overrides
#
# Registry auth:
#   Uses GITHUB_TOKEN (auto-provisioned per-job) with `packages: write` to push
#   to ghcr.io under the owning user/org's namespace. No PAT required.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      kc_version:
        description: 'Keycloak version (must match anki-mcp-infrastructure operator version)'
        required: false
        default: '26.5.7'
      plugin_git_sha:
        description: 'Upstream Herdo/keycloak-remember-me-authenticator commit, for the OCI label'
        required: false
        default: 'de35b36'

# Least-privilege at the workflow level. Individual jobs narrow further where
# they can (smoke-test and integration-test only need to *pull* from GHCR, and
# the release job needs `contents: write` + `packages: write` to create the
# Release and promote the verified image tag on tag push).
permissions:
  contents: read
  packages: write

# Cancel in-progress builds on main when a newer push lands (saves CI minutes
# on rapid-succession merges). Do NOT cancel tag builds -- a v* tag push is a
# release artifact and must complete even if main is moving.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keycloak-bundled
  # Fallback defaults for non-dispatch triggers. Keep in sync with the
  # workflow_dispatch input defaults above.
  DEFAULT_KC_VERSION: '26.5.7'
  DEFAULT_PLUGIN_GIT_SHA: 'de35b36'

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    # Job-level outputs surface the immutable image tag (and a few inputs) to
    # downstream jobs. `smoke-test` and `integration-test` both pull by the
    # SHA-suffixed tag because it is the only tag guaranteed to identify *this
    # exact build* -- `latest` and the per-day tag can race with a parallel run.
    # On `v*` tag pushes we also expose the stripped semver so the release job
    # can promote the verified image to it without recomputing.
    outputs:
      image_tag_sha: ${{ steps.meta.outputs.image_tag_sha }}
      image_ref_sha: ${{ steps.meta.outputs.image_ref_sha }}
      kc_version: ${{ steps.meta.outputs.kc_version }}
      release_version: ${{ steps.meta.outputs.release_version }}

    # Permission notes for this job:
    #   contents: read  -- only need source checkout; Release creation moved to
    #     the `release` job which holds `contents: write`.
    #   packages: write -- push to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        # v6 is a Node 24 runtime bump (no input/output changes affecting our
        # usage). ubuntu-latest ships runner >= v2.327.1, which satisfies the
        # Node 24 requirement.
        uses: actions/checkout@v6

      - name: Lint Dockerfile (hadolint)
        # Pinned to a specific patch -- hadolint-action doesn't publish a
        # floating `v3` tag (verified against the GitHub Releases API).
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile

      - name: Lint workflow files (actionlint)
        # raven-actions/actionlint is the conventional wrapper around rhysd's
        # actionlint CLI. The rhysd/actionlint repo itself is a Go CLI with no
        # action.yml, so a wrapper is required if we want `uses:` semantics.
        # Pinned to a specific patch -- raven-actions/actionlint doesn't
        # publish a floating `v2` tag either.
        uses: raven-actions/actionlint@v2.1.2

      - name: Compute build metadata
        id: meta
        # User-supplied dispatch inputs are exposed via env (not inline ${{ }})
        # so the shell never sees them as code -- see
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
        env:
          INPUT_KC_VERSION: ${{ github.event.inputs.kc_version }}
          INPUT_PLUGIN_GIT_SHA: ${{ github.event.inputs.plugin_git_sha }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          # Inputs take precedence on workflow_dispatch; otherwise use env defaults.
          KC_VERSION="${INPUT_KC_VERSION:-${DEFAULT_KC_VERSION}}"
          PLUGIN_GIT_SHA="${INPUT_PLUGIN_GIT_SHA:-${DEFAULT_PLUGIN_GIT_SHA}}"
          VCS_REF="${GH_SHA}"
          VCS_REF_SHORT="${VCS_REF:0:7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DATE_TAG="$(date -u +%Y.%m.%d)"

          IMAGE_TAG_SHA="${KC_VERSION}-${DATE_TAG}-${VCS_REF_SHORT}"
          IMAGE_REF_SHA="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG_SHA}"

          # On a `v*` tag push, expose the v-stripped form (e.g. `v1.0.0` ->
          # `1.0.0`) so the release job can promote the verified immutable
          # image to it. Empty otherwise; the release job's `if:` guards on
          # `startsWith(github.ref, 'refs/tags/v')` regardless.
          RELEASE_VERSION=""
          if [[ "${GH_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GH_REF#refs/tags/v}"
          fi

          {
            echo "kc_version=${KC_VERSION}"
            echo "plugin_git_sha=${PLUGIN_GIT_SHA}"
            echo "vcs_ref=${VCS_REF}"
            echo "vcs_ref_short=${VCS_REF_SHORT}"
            echo "build_date=${BUILD_DATE}"
            echo "date_tag=${DATE_TAG}"
            echo "image_tag_sha=${IMAGE_TAG_SHA}"
            echo "image_ref_sha=${IMAGE_REF_SHA}"
            echo "release_version=${RELEASE_VERSION}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved KC_VERSION=${KC_VERSION}"
          echo "Resolved PLUGIN_GIT_SHA=${PLUGIN_GIT_SHA}"
          echo "Resolved VCS_REF_SHORT=${VCS_REF_SHORT}"
          echo "Resolved BUILD_DATE=${BUILD_DATE}"
          echo "Resolved DATE_TAG=${DATE_TAG}"
          echo "Resolved IMAGE_TAG_SHA=${IMAGE_TAG_SHA}"
          echo "Resolved RELEASE_VERSION=${RELEASE_VERSION:-<none>}"

      - name: Set up QEMU
        # v4 is a Node 24 runtime bump only; no input changes.
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        # v4 is a Node 24 runtime bump; removed the deprecated `install:` input
        # (we don't use it). Our parameterless usage is unaffected.
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        # v4 is a Node 24 runtime bump; inputs unchanged.
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        # v7 is a Node 24 runtime bump; removed deprecated
        # DOCKER_BUILD_NO_SUMMARY / DOCKER_BUILD_EXPORT_RETENTION_DAYS envs --
        # we don't set them, so no workflow-side change required.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Multi-arch: arm64 is QEMU-emulated on the GitHub amd64 runner, which
          # adds ~5-10 minutes to the Maven and `kc.sh build` phases. The
          # cluster supports both archs (staging runs on Apple Silicon under
          # QEMU), so we publish a manifest list covering both.
          platforms: linux/amd64,linux/arm64
          build-args: |
            KC_VERSION=${{ steps.meta.outputs.kc_version }}
            PLUGIN_GIT_SHA=${{ steps.meta.outputs.plugin_git_sha }}
            VCS_REF=${{ steps.meta.outputs.vcs_ref }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SBOM (CycloneDX/SPDX) and max-mode provenance attestation. Both
          # land in the registry alongside the manifest and surface on the
          # ghcr.io package page for supply-chain inspection.
          sbom: true
          provenance: mode=max
          # Three tags on every build:
          #   - immutable SHA tag (referenced by downstream test jobs)
          #   - floating per-day tag
          #   - :latest
          # The human-readable `<release_version>` tag for v* pushes is NOT
          # published here -- it is promoted by the `release` job only after
          # smoke-test + integration-test pass. This prevents a failed build
          # from ever holding a public semver tag.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.kc_version }}-${{ steps.meta.outputs.date_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  smoke-test:
    name: Smoke test (boot + provider registration)
    runs-on: ubuntu-latest
    needs: build-and-push

    # Read-only at the registry: we are pulling our own freshly-pushed image
    # back down to assert the container actually boots and the SPI is wired.
    permissions:
      contents: read
      packages: read

    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref_sha }}

    steps:
      - name: Log in to GitHub Container Registry (pull)
        # Even though GITHUB_TOKEN has `packages: read` on this job, docker
        # still needs a credentials helper entry to pull from ghcr.io for
        # private packages. For public packages this is a no-op; keeping the
        # step makes the workflow forward-compatible if the package is later
        # set private.
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image (linux/amd64)
        run: |
          set -euo pipefail
          echo "Pulling ${IMAGE_REF} (linux/amd64)"
          # Multi-arch manifest -- explicitly request amd64 to avoid the
          # runner accidentally fetching an arm64 layer it can't execute.
          docker pull --platform linux/amd64 "${IMAGE_REF}"

      - name: Start container (start-dev, no DB)
        # `start --optimized` requires a configured DB and hostname. For a
        # boot smoke test we only need the server to come up and answer the
        # admin API, so `start-dev` (which uses the in-memory dev DB and
        # disables strict hostname checks) is the right call. The Dockerfile
        # comment already calls this out as the smoke-testing path.
        run: |
          set -euo pipefail
          docker run -d --name kc-smoke \
            --platform linux/amd64 \
            -p 8080:8080 \
            -p 9000:9000 \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -e KC_HEALTH_ENABLED=true \
            "${IMAGE_REF}" \
            start-dev
          echo "Container started:"
          docker ps --filter name=kc-smoke

      - name: Wait for /health/ready (max 120s)
        run: |
          set -euo pipefail
          # 9000 is Keycloak's management interface (KC_HTTP_MANAGEMENT_PORT).
          # /health/ready returns 200 once Quarkus has finished augmentation
          # and the realm bootstrap is complete. Earlier responses (503/404)
          # are normal during boot.
          for i in $(seq 1 60); do
            if curl --silent --fail --output /dev/null \
                 --max-time 5 http://localhost:9000/health/ready; then
              echo "Keycloak ready after ${i} attempts (~$((i * 2))s)"
              exit 0
            fi
            echo "Attempt ${i}/60: not ready yet, sleeping 2s"
            sleep 2
          done
          echo "::error::Keycloak failed to reach /health/ready within 120s"
          echo "----- docker ps -----"
          docker ps -a
          echo "----- container logs (tail 200) -----"
          docker logs --tail 200 kc-smoke || true
          exit 1

      - name: Assert remember-me-authenticator provider is registered
        # Critical assertion: the whole point of this image is the SPI plugin.
        # Boot success alone doesn't prove it -- `kc.sh build` succeeded at
        # image-build time, but a packaging regression could still ship the
        # JAR without registering the factory. We hit the admin API to be
        # sure.
        run: |
          set -euo pipefail

          echo "Requesting admin token from master realm"
          TOKEN_JSON="$(
            curl --silent --fail --show-error --max-time 10 \
              -X POST http://localhost:8080/realms/master/protocol/openid-connect/token \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              -d 'grant_type=password' \
              -d 'client_id=admin-cli' \
              -d 'username=admin' \
              -d 'password=admin'
          )"
          ACCESS_TOKEN="$(echo "${TOKEN_JSON}" | jq -r '.access_token')"
          if [[ -z "${ACCESS_TOKEN}" || "${ACCESS_TOKEN}" == "null" ]]; then
            echo "::error::Failed to obtain admin token. Response:"
            echo "${TOKEN_JSON}"
            exit 1
          fi
          echo "Admin token acquired (length=${#ACCESS_TOKEN})"

          echo "Listing authenticator providers"
          PROVIDERS_JSON="$(
            curl --silent --fail --show-error --max-time 10 \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              http://localhost:8080/admin/realms/master/authentication/authenticator-providers
          )"

          # Provider ID confirmed from
          # src/src/main/java/.../RememberMeAuthenticatorFactory.java:
          #     public static final String PROVIDER_ID = "remember-me-authenticator";
          if echo "${PROVIDERS_JSON}" | jq -e '.[] | select(.id == "remember-me-authenticator")' >/dev/null; then
            echo "OK: remember-me-authenticator provider is registered:"
            echo "${PROVIDERS_JSON}" | jq '.[] | select(.id == "remember-me-authenticator")'
          else
            echo "::error::remember-me-authenticator NOT found in authenticator-providers response."
            echo "Full provider list:"
            echo "${PROVIDERS_JSON}" | jq '.[].id' || echo "${PROVIDERS_JSON}"
            exit 1
          fi

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "----- docker logs kc-smoke -----"
          docker logs kc-smoke || true

      - name: Stop and remove container
        if: always()
        run: |
          docker stop kc-smoke || true
          docker rm   kc-smoke || true

  integration-test:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-push

    # Pull-only on the registry; Failsafe runs against the freshly-pushed
    # image via Testcontainers, which talks to the runner's Docker daemon
    # using whatever credentials the docker/login-action step deposited.
    permissions:
      contents: read
      packages: read

    env:
      # The pom-level Failsafe configuration is expected to read this system
      # property and pass it to Testcontainers' `GenericContainer(...)` ctor.
      # Owned by the other agent's pom.xml + *IT.java changes -- we just
      # surface the value here.
      KC_IMAGE: ${{ needs.build-and-push.outputs.image_ref_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21 with Maven cache
        # v5 is a Node 24 runtime bump only; `distribution` / `java-version` /
        # `cache` inputs are unchanged. The `cache: maven` flag wires the
        # built-in cache around ~/.m2 keyed on the workspace's pom.xml hash --
        # it auto-discovers our `src/pom.xml`.
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Log in to GitHub Container Registry (pull)
        # Testcontainers shells out to the host Docker daemon to pull our
        # image. The daemon uses /home/runner/.docker/config.json for auth,
        # which docker/login-action populates. Required even for public
        # packages on rate-limited windows, and necessary if the package
        # later flips to private.
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests (Maven verify)
        # Pom lives at src/pom.xml as a single-module project (no parent pom
        # at repo root), so we cd into src/ via `working-directory` rather
        # than try `-pl src` -- the latter would require src/ to be a
        # declared <module> in a parent pom, which it isn't.
        # `-B -ntp` is non-interactive batch + no transfer progress, the
        # standard CI duo. The `image.ref` system property is the agreed
        # handshake with the *IT.java tests: they read it via
        # System.getProperty and feed it into Testcontainers.
        working-directory: src
        run: |
          set -euo pipefail
          echo "Running integration tests against image: ${KC_IMAGE}"
          mvn -B -ntp verify -Dimage.ref="${KC_IMAGE}"

      - name: Upload Failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: |
            src/target/failsafe-reports/
            src/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Promote image tag and publish GitHub Release
    runs-on: ubuntu-latest
    # Gate the release entirely on downstream verification. If either smoke
    # or integration tests fail, this job is skipped and no human-readable
    # semver tag ever lands in GHCR -- the only artifacts of a failed v*
    # build are the immutable SHA tag, the date tag, and :latest (which we
    # still produce so cache hits keep working for the next retry).
    needs: [build-and-push, smoke-test, integration-test]
    # Only run on `v*` tag pushes. On main/dispatch this entire job is
    # skipped cleanly.
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      # contents: write -- required by softprops/action-gh-release to create
      #   the GitHub Release on `v*` tag push.
      # packages: write -- required by `docker buildx imagetools create` to
      #   write the new tag manifest pointer to GHCR.
      contents: write
      packages: write

    env:
      IMAGE_REF_SHA: ${{ needs.build-and-push.outputs.image_ref_sha }}
      RELEASE_VERSION: ${{ needs.build-and-push.outputs.release_version }}

    steps:
      - name: Log in to GitHub Container Registry
        # Same login pattern as build-and-push: GITHUB_TOKEN, packages:write.
        # imagetools talks to the registry HTTP API; no source checkout is
        # needed because we don't build anything here.
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # Required for `docker buildx imagetools`. The default Docker CLI
        # installed on ubuntu-latest already ships buildx, but using the
        # action ensures a known-good buildx version regardless of runner
        # image drift.
        uses: docker/setup-buildx-action@v4

      - name: Promote immutable SHA tag to release tag
        # `docker buildx imagetools create` is the right tool here:
        #   - It works on manifest lists (our image is multi-arch:
        #     amd64+arm64); plain `docker tag` + `docker push` would
        #     re-tag whatever single-arch variant the runner happened to
        #     pull, breaking arm64 consumers.
        #   - It is server-side only: no layers are downloaded or
        #     re-uploaded. The new tag is a manifest pointer to the same
        #     content hash as the SHA tag. Atomic and ~5 seconds.
        #   - It preserves all attestations (SBOM, provenance) attached
        #     to the source manifest because they reference the manifest
        #     digest, not the tag.
        # Skopeo would also work but pulls in an extra apt install step
        # for no operational benefit on the GitHub-hosted runner.
        env:
          IMAGE_REF_SHA: ${{ env.IMAGE_REF_SHA }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          TARGET_REF="${REGISTRY}/${IMAGE_NAME}:${RELEASE_VERSION}"
          echo "Promoting ${IMAGE_REF_SHA} -> ${TARGET_REF}"
          docker buildx imagetools create \
            --tag "${TARGET_REF}" \
            "${IMAGE_REF_SHA}"
          echo "Verifying new tag:"
          docker buildx imagetools inspect "${TARGET_REF}"

      - name: Create GitHub Release
        # v3 is a Node 20 -> Node 24 runtime bump only; the input schema
        # (`generate_release_notes`, `draft`, `prerelease`, `name`, `body`,
        # `files`, `tag_name`, etc.) is identical to v2. Release title
        # defaults to the tag name, which is what we want.
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          # We do not yet differentiate prerelease tags (e.g. `v1.0.0-rc1`).
          # When we do, set prerelease conditionally from a shell step that
          # inspects the tag suffix and writes to $GITHUB_OUTPUT.
          prerelease: false
